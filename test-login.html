<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Login - Servo Tech Finanças</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            margin-bottom: 30px;
        }
        button {
            background: #4285f4;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        button:hover {
            background: #3367d6;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            font-weight: bold;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        .user-info {
            margin-top: 20px;
            text-align: left;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">💰</div>
        <h1>Teste de Login</h1>
        <p>Servo Tech Finanças</p>
        
        <button id="login-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Entrar com Google
        </button>
        
        <button id="logout-btn" style="display: none; background: #dc3545;">
            Sair
        </button>
        
        <div id="status"></div>
        <div id="user-info" style="display: none;"></div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { 
            getAuth, 
            GoogleAuthProvider, 
            signInWithPopup, 
            signOut,
            onAuthStateChanged 
        } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

        // Configuração do Firebase
        const firebaseConfig = {
      apiKey: 'AIzaSyCbBmmxn4Qj4CU6ymfG4MY5VGqCPSo13HY',
      authDomain: 'controle-financeiro-b98ec.firebaseapp.com',
      projectId: 'controle-financeiro-b98ec',
      storageBucket: 'controle-financeiro-b98ec.firebasestorage.app',
      messagingSenderId: '418109336597',
      appId: '1:418109336597:web:871b262a76e57455ebb21c',
      measurementId: 'G-7RW2F269V6'
    };

        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // Elementos DOM
        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const status = document.getElementById('status');
        const userInfo = document.getElementById('user-info');

        // Função para mostrar status
        function showStatus(message, type = 'info') {
            status.innerHTML = `<div class="${type}">${message}</div>`;
        }

        // Função para mostrar informações do usuário
        function showUserInfo(user) {
            userInfo.style.display = 'block';
            userInfo.innerHTML = `
                <h3>Usuário Logado:</h3>
                <p><strong>Nome:</strong> ${user.displayName}</p>
                <p><strong>Email:</strong> ${user.email}</p>
                <p><strong>UID:</strong> ${user.uid}</p>
                <p><strong>Foto:</strong> <img src="${user.photoURL}" alt="Foto" style="width: 40px; height: 40px; border-radius: 50%;"></p>
            `;
        }

        // Login com Google
        loginBtn.addEventListener('click', async () => {
            try {
                loginBtn.disabled = true;
                showStatus('Fazendo login...', 'info');
                
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                
                showStatus('Login realizado com sucesso!', 'success');
                showUserInfo(user);
                
                loginBtn.style.display = 'none';
                logoutBtn.style.display = 'block';
                
            } catch (error) {
                console.error('Erro no login:', error);
                showStatus(`Erro no login: ${error.message}`, 'error');
                loginBtn.disabled = false;
            }
        });

        // Logout
        logoutBtn.addEventListener('click', async () => {
            try {
                await signOut(auth);
                showStatus('Logout realizado com sucesso!', 'success');
                
                loginBtn.style.display = 'block';
                logoutBtn.style.display = 'none';
                userInfo.style.display = 'none';
                loginBtn.disabled = false;
                
            } catch (error) {
                console.error('Erro no logout:', error);
                showStatus(`Erro no logout: ${error.message}`, 'error');
            }
        });

        // Monitorar estado de autenticação
        onAuthStateChanged(auth, (user) => {
            if (user) {
                console.log('Usuário autenticado:', user);
                showStatus('Usuário já está logado!', 'success');
                showUserInfo(user);
                loginBtn.style.display = 'none';
                logoutBtn.style.display = 'block';
            } else {
                console.log('Usuário não autenticado');
                showStatus('Faça login para continuar', 'info');
                loginBtn.style.display = 'block';
                logoutBtn.style.display = 'none';
                userInfo.style.display = 'none';
                loginBtn.disabled = false;
            }
        });

        // Verificar se Firebase foi carregado
        showStatus('Firebase carregado. Clique para fazer login.', 'info');
    </script>
</body>
</html>
